<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz de Plantas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      h1 {
        color: #2d3748;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .score {
        background: linear-gradient(45deg, #48bb78, #38a169);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        margin-bottom: 20px;
        font-weight: bold;
        font-size: 1.2em;
      }

      .plant-image {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 15px;
        margin: 20px auto;
        display: block;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .plant-image:hover {
        transform: scale(1.05);
      }

      .question {
        font-size: 1.5em;
        color: #2d3748;
        margin: 20px 0;
        font-weight: bold;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 30px 0;
      }

      .option {
        background: linear-gradient(45deg, #4299e1, #3182ce);
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1em;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .option:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .option:active {
        transform: translateY(0);
      }

      .option.correct {
        background: linear-gradient(45deg, #48bb78, #38a169);
        animation: pulse 0.5s ease-in-out;
      }

      .option.incorrect {
        background: linear-gradient(45deg, #f56565, #e53e3e);
        animation: shake 0.5s ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .next-button {
        background: linear-gradient(45deg, #805ad5, #6b46c1);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.2em;
        margin-top: 20px;
        transition: all 0.3s ease;
        display: none;
      }

      .next-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .loading {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        color: #e53e3e;
        background: #fed7d7;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
      }

      .reset-button {
        background: linear-gradient(45deg, #ed8936, #dd6b20);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 1em;
        margin-left: 10px;
        transition: all 0.3s ease;
      }

      .reset-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌱 Quiz de Plantas</h1>

      <div class="score">
        Puntuación: <span id="score">0</span>
        <button class="reset-button" onclick="resetGame()">Reiniciar</button>
      </div>

      <div id="loading" class="loading" style="display: none"></div>
      <div id="error" class="error" style="display: none"></div>

      <img
        id="plant-image"
        class="plant-image"
        style="display: none"
        alt="Planta misteriosa"
      />

      <div class="question" id="question" style="display: none">
        ¿Qué planta es esta?
      </div>

      <div class="options" id="options" style="display: none">
        <button class="option" onclick="selectOption(0)"></button>
        <button class="option" onclick="selectOption(1)"></button>
        <button class="option" onclick="selectOption(2)"></button>
        <button class="option" onclick="selectOption(3)"></button>
      </div>

      <button class="next-button" id="next-button" onclick="nextQuestion()">
        Siguiente Pregunta
      </button>
    </div>

    <script>
      // Lista de plantas específica del usuario
      const plants = [
        "Plátano de sombra",
        "Olmo",
        "Pino piñonero",
        "Ciprés común",
        "Jacaranda",
        "Acacia de Constantinopla",
        "Fresno",
        "Almez",
        "Tilo",
        "Laurel",
        "Adelfa",
        "Arce",
        "Olivo",
        "Sauce llorón",
        "Photinia",
        "Madroño",
        "Romero",
        "Lavanda",
        "Lilo",
        "Morera",
        "Ligustro",
        "Durillo",
        "Hibisco",
        "Pittosporo japonés",
        "Encina",
        "Aligustre de Japón",
        "Pyracantha",
        "Callistemon",
        "Celinda",
        "Cotoneaster",
        "Laurel cerezo",
        "Granado",
        "Boj",
        "Adelfilla",
        "Enebro",
        "Aligustre oval",
        "Árbol del amor",
        "Madreselva",
        "Sauce blanco",
        "Ailanto",
        "Roble común",
        "Árbol del paraíso",
        "Castaño de Indias",
        "Abeto rojo",
        "Pino carrasco",
        "Eucalipto común",
        "Álamo blanco",
        "Álamo negro",
        "Tamarindo",
        "Morera negra",
        "Falso pimentero",
        "Aligustre lucido",
        "Magnolio",
        "Arce real",
        "Ficus benjamina",
        "Ciruelo rojo",
        "Acacia de tres espinas",
        "Falso plátano",
        "Serbal de cazadores",
        "Almez americano",
        "Sophora japónica",
        "Paulownia",
        "Catalpa",
        "Arce negundo",
        "Peral de flor",
        "Tetraclinis",
        "Ginkgo",
        "Árbol del coral",
        "Cladrastis lutea",
        "Petunia",
        "Tagete",
        "Salvia roja",
        "Zinnia",
        "Alegría de la casa",
        "Begonia semperflorens",
        "Verbena",
        "Dalia",
        "Gazania",
        "Portulaca",
        "Pensamiento",
        "Prímula",
        "Ciclamen",
        "Caléndula",
        "Bellis",
        "Alhelí",
        "Col ornamental",
        "Miosotis",
        "Ranúnculo",
        "Viola cornuta",
        "Brachychiton populneus",
        "Parrotia",
        "Liquidámbar",
        "Albizia lebbeck",
        "Koelreuteria",
        "Sophora microphylla",
        "Nyssa sylvatica",
        "Cercidiphyllum japonicum",
        "Pyrus pyraster",
        "Sophora davidii",
      ];

      let currentPlant = "";
      let correctAnswer = 0;
      let score = 0;
      let gameActive = false;

      // Función para obtener imagen de planta desde Wikipedia API
      async function getPlantImage(plantName) {
        try {
          // Primero intentamos buscar la página
          const searchResponse = await fetch(
            `https://es.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(
              plantName
            )}&format=json&origin=*`
          );
          const searchData = await searchResponse.json();

          if (
            searchData.query &&
            searchData.query.search &&
            searchData.query.search.length > 0
          ) {
            const pageTitle = searchData.query.search[0].title;

            // Obtenemos la imagen de la página
            const imageResponse = await fetch(
              `https://es.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&piprop=original&titles=${encodeURIComponent(
                pageTitle
              )}&origin=*`
            );
            const imageData = await imageResponse.json();

            const pages = imageData.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pages[pageId].original) {
              return {
                image: pages[pageId].original.source,
                name: plantName,
              };
            }
          }

          // Si no encuentra en español, intenta en inglés
          return await getPlantImageEnglish(plantName);
        } catch (error) {
          console.error("Error obteniendo imagen de Wikipedia ES:", error);
          return await getPlantImageEnglish(plantName);
        }
      }

      // Función alternativa usando Wikipedia en inglés
      async function getPlantImageEnglish(plantName) {
        try {
          // Mapeo de nombres comunes a nombres científicos o en inglés
          const plantMappings = {
            "Plátano de sombra": "Platanus hispanica",
            Olmo: "Ulmus minor",
            "Pino piñonero": "Pinus pinea",
            "Ciprés común": "Cupressus sempervirens",
            Jacaranda: "Jacaranda mimosifolia",
            "Acacia de Constantinopla": "Albizia julibrissin",
            Fresno: "Fraxinus angustifolia",
            Almez: "Celtis australis",
            Tilo: "Tilia platyphyllos",
            Laurel: "Laurus nobilis",
            Adelfa: "Nerium oleander",
            Arce: "Acer campestre",
            Olivo: "Olea europaea",
            "Sauce llorón": "Salix babylonica",
            Photinia: "Photinia fraseri",
            Madroño: "Arbutus unedo",
            Romero: "Rosmarinus officinalis",
            Lavanda: "Lavandula angustifolia",
            Lilo: "Syringa vulgaris",
            Morera: "Morus alba",
            Ligustro: "Ligustrum vulgare",
            Durillo: "Viburnum tinus",
            Hibisco: "Hibiscus syriacus",
            "Pittosporo japonés": "Pittosporum tobira",
            Encina: "Quercus ilex",
            Ginkgo: "Ginkgo biloba",
            "Eucalipto común": "Eucalyptus globulus",
            Magnolio: "Magnolia grandiflora",
            Petunia: "Petunia hybrida",
            Dalia: "Dahlia pinnata",
            Zinnia: "Zinnia elegans",
            Pensamiento: "Viola wittrockiana",
            Caléndula: "Calendula officinalis",
          };

          const searchTerm = plantMappings[plantName] || plantName;

          const searchResponse = await fetch(
            `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(
              searchTerm
            )}&format=json&origin=*`
          );
          const searchData = await searchResponse.json();

          if (
            searchData.query &&
            searchData.query.search &&
            searchData.query.search.length > 0
          ) {
            const pageTitle = searchData.query.search[0].title;

            const imageResponse = await fetch(
              `https://en.wikipedia.org/w/api.php?action=query&prop=pageimages&format=json&piprop=original&titles=${encodeURIComponent(
                pageTitle
              )}&origin=*`
            );
            const imageData = await imageResponse.json();

            const pages = imageData.query.pages;
            const pageId = Object.keys(pages)[0];

            if (pages[pageId].original) {
              return {
                image: pages[pageId].original.source,
                name: plantName,
              };
            }
          }

          // Si no encuentra imagen, usar imagen por defecto
          return {
            image: `https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/330px-No-Image-Placeholder.svg.png`,
            name: plantName,
          };
        } catch (error) {
          console.error("Error obteniendo imagen de Wikipedia EN:", error);
          return {
            image: `https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/330px-No-Image-Placeholder.svg.png`,
            name: plantName,
          };
        }
      }

      async function loadQuestion() {
        gameActive = false;
        document.getElementById("loading").style.display = "block";
        document.getElementById("plant-image").style.display = "none";
        document.getElementById("question").style.display = "none";
        document.getElementById("options").style.display = "none";
        document.getElementById("next-button").style.display = "none";
        document.getElementById("error").style.display = "none";

        // Seleccionar planta aleatoria
        currentPlant = plants[Math.floor(Math.random() * plants.length)];

        try {
          // Intentar obtener imagen real desde Wikipedia
          const plantData = await getPlantImage(currentPlant);

          if (plantData) {
            document.getElementById("plant-image").src = plantData.image;
            document.getElementById("plant-image").style.display = "block";

            // Crear opciones
            const options = [currentPlant];
            while (options.length < 4) {
              const randomPlant =
                plants[Math.floor(Math.random() * plants.length)];
              if (!options.includes(randomPlant)) {
                options.push(randomPlant);
              }
            }

            // Mezclar opciones
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            correctAnswer = shuffledOptions.indexOf(currentPlant);

            // Mostrar opciones
            const optionButtons = document.querySelectorAll(".option");
            optionButtons.forEach((button, index) => {
              button.textContent = shuffledOptions[index];
              button.className = "option";
              button.disabled = false;
            });

            document.getElementById("loading").style.display = "none";
            document.getElementById("question").style.display = "block";
            document.getElementById("options").style.display = "grid";
            gameActive = true;
          } else {
            throw new Error("No se pudo cargar la imagen");
          }
        } catch (error) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById("error").textContent =
            "Error cargando la pregunta. Intenta de nuevo.";

          setTimeout(() => {
            loadQuestion();
          }, 3000);
        }
      }

      function selectOption(selectedIndex) {
        if (!gameActive) return;

        gameActive = false;
        const optionButtons = document.querySelectorAll(".option");

        optionButtons.forEach((button, index) => {
          button.disabled = true;
          if (index === correctAnswer) {
            button.classList.add("correct");
          } else if (index === selectedIndex) {
            button.classList.add("incorrect");
          }
        });

        if (selectedIndex === correctAnswer) {
          score++;
          document.getElementById("score").textContent = score;
        }

        document.getElementById("next-button").style.display = "block";
      }

      function nextQuestion() {
        loadQuestion();
      }

      function resetGame() {
        score = 0;
        document.getElementById("score").textContent = score;
        loadQuestion();
      }

      // Inicializar juego
      loadQuestion();
    </script>
  </body>
</html>
