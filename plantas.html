<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz de Plantas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      h1 {
        color: #2d3748;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .score {
        background: linear-gradient(45deg, #48bb78, #38a169);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        margin-bottom: 20px;
        font-weight: bold;
        font-size: 1.2em;
      }

      .plant-image {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 15px;
        margin: 20px auto;
        display: block;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .plant-image:hover {
        transform: scale(1.05);
      }

      .question {
        font-size: 1.5em;
        color: #2d3748;
        margin: 20px 0;
        font-weight: bold;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 30px 0;
      }

      .option {
        background: linear-gradient(45deg, #4299e1, #3182ce);
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1em;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .option:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .option:active {
        transform: translateY(0);
      }

      .option.correct {
        background: linear-gradient(45deg, #48bb78, #38a169);
        animation: pulse 0.5s ease-in-out;
      }

      .option.incorrect {
        background: linear-gradient(45deg, #f56565, #e53e3e);
        animation: shake 0.5s ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .next-button {
        background: linear-gradient(45deg, #805ad5, #6b46c1);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.2em;
        margin-top: 20px;
        transition: all 0.3s ease;
        display: none;
      }

      .next-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .loading {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        color: #e53e3e;
        background: #fed7d7;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
      }

      .reset-button {
        background: linear-gradient(45deg, #ed8936, #dd6b20);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 1em;
        margin-left: 10px;
        transition: all 0.3s ease;
      }

      .reset-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌱 Quiz de Plantas</h1>

      <div class="score">
        Puntuación: <span id="score">0</span>
        <button class="reset-button" onclick="resetGame()">Reiniciar</button>
      </div>

      <div id="loading" class="loading" style="display: none"></div>
      <div id="error" class="error" style="display: none"></div>

      <img
        id="plant-image"
        class="plant-image"
        style="display: none"
        alt="Planta misteriosa"
      />

      <div class="question" id="question" style="display: none">
        ¿Qué planta es esta?
      </div>

      <div class="options" id="options" style="display: none">
        <button class="option" onclick="selectOption(0)"></button>
        <button class="option" onclick="selectOption(1)"></button>
        <button class="option" onclick="selectOption(2)"></button>
        <button class="option" onclick="selectOption(3)"></button>
      </div>

      <button class="next-button" id="next-button" onclick="nextQuestion()">
        Siguiente Pregunta
      </button>
    </div>

    <script>
      let currentPlant = "";
      let correctAnswer = 0;
      let score = 0;
      let gameActive = false;
      let plantsList = [];

      // Lista estática de plantas basada en tus archivos
      const staticPlantsList = [
        "Abeto rojo (Picea abies)",
        "Acacia de Constantinopla (Albizia julibrissin)",
        "Acacia de tres espinas (Gleditsia triacanthos)",
        "Acacia falsa ( Robinia pseudoacacia )",
        "Adelfa (Nerium oleander)",
        "Adelfilla (Oenothera biennis)",
        "Ailanto Árbol del cielo (Ailanthus altissima)",
        "Albizia lebbeck (Albizia lebbeck)",
        "Alegría de la casa (Impatiens walleriana)",
        "Alhelí (Matthiola incana)",
        "Aligustre de Japón (Ligustrum japonicum)",
        "Aligustre lucido (Ligustrum lucidum)",
        "Aligustre oval (Ligustrum ovalifolium)",
        "Almez (Celtis australis)",
        "Almez americano (Celtis occidentalis)",
        "Arce negundo (Acer negundo)",
        "Arce plateado ( acer saccharinum )",
        "Arce real (Acer platanoides)",
        "Begonia semperflorens (Begonia semperflorens)",
        "Bellis  Margarita de los prados (Bellis perennis)",
        "Boj (Buxus sempervirens)",
        "Brachychiton  Árbol botella (Brachychiton populneus)",
        "Buganvilla (Bougainvillea glabra)",
        "Callistemon  (Callistemon citrinus)",
        "Caléndula (Calendula officinalis)",
        "Castaño de Indias (Aesculus hippocastanum)",
        "Catalpa (Catalpa bignonioides)",
        "Celinda (Philadelphus coronarius)",
        "Ciclamen (Cyclamen persicum)",
        "Ciprés común (Cupressus sempervirens)",
        "Ciruelo rojo (Prunus cerasifera 'Nigra')",
        "Cladrastis lutea (Cladrastis kentukea)",
        "Col ornamental (Brassica oleracea var. acephala)",
        "Cotoneaster (Cotoneaster horizontalis)",
        "Dalia (Dahlia pinnata)",
        "Dichondra (Dichondra repens)",
        "Durillo (Viburnum tinus)",
        "Encina (Quercus ilex)",
        "Enebro (Juniperus communis)",
        "Eucalipto común (Eucalyptus globulus)",
        "Falso pimentero (Schinus molle)",
        "Falso plátano (Platanus orientalis)",
        "Ficus benjamina (Ficus benjamina)",
        "Fresno (Fraxinus angustifolia)",
        "Gazania (Gazania rigens)",
        "Ginkgo (Ginkgo biloba)",
        "Glicinia (Wisteria sinensis)",
        "Granado (Punica granatum)",
        "Hibisco (Hibiscus syriacus)",
        "Hiedra común (Hedera helix)",
        "Jacaranda (Jacaranda mimosifolia)",
        "Jazmín (Jasminum officinale)",
        "Koelreuteria  Jabonero de China (Koelreuteria paniculata)",
        "Laurel (Laurus nobilis)",
        "Laurel cerezo (Prunus laurocerasus)",
        "Lavanda (Lavandula angustifolia)",
        "Ligustro (Ligustrum vulgare)",
        "Lilo (Syringa vulgaris)",
        "Liquidámbar (Liquidambar styraciflua)",
        "Madreselva (Lonicera japonica)",
        "Madroño (Arbutus unedo)",
        "Magnolio (Magnolia grandiflora)",
        "Miosotis  Nomeolvides (Myosotis sylvatica)",
        "Morera (Morus alba)",
        "Morera negra (Morus nigra)",
        "Nyssa sylvatica   Tupelo negro (Nyssa sylvatica)",
        "Olivo (Olea europaea)",
        "Olmo (Ulmus minor)",
        "Parra virgen (Parthenocissus tricuspidata)",
        "Parrotia  Árbol de hierro (Parrotia persica)",
        "Paulownia (Paulownia tomentosa)",
        "Pensamiento (Viola × wittrockiana)",
        "Peral de flor (Pyrus calleryana)",
        "Peral silvestre (Pyrus pyraster)",
        "Petunia (Petunia hybrida)",
        "Photinia (Photinia × fraseri)",
        "Pino carrasco (Pinus halepensis)",
        "Pino piñonero (Pinus pinea)",
        "Pittosporo japonés (Pittosporum tobira)",
        "Plátano de sombra (Platanus × hispanica)",
        "Portulaca Flor de seda (Portulaca grandiflora)",
        "Prímula (Primula acaulis)",
        "Pyracantha (Pyracantha coccinea)",
        "Ranúnculo (Ranunculus asiaticus)",
        "Roble común (Quercus robur)",
        "Romero (Rosmarinus officinalis)",
        "Salvia roja (Salvia splendens)",
        "Sauce blanco (Salix alba)",
        "Sauce llorón (Salix babylonica)",
        "Serbal de cazadores (Sorbus aucuparia)",
        "Sophora davidii (Sophora davidii)",
        "Sophora japónica (Styphnolobium japonicum)",
        "Sophora microphylla (Sophora microphylla)",
        "Tagete  Clavel de moro (Tagetes patula)",
        "Tamarindo (Tamarix gallica)",
        "Tetraclinis  Ciprés de Cartagena (Tetraclinis articulata)",
        "Tilo (Tilia platyphyllos)",
        "Tomillo (Thymus vulgaris)",
        "Verbena (Verbena hybrida)",
        "Vinca minor (Vinca, Hierba doncella)",
        "Viola cornuta (Viola cornuta)",
        "Zinnia (Zinnia elegans)",
        "Álamo blanco (Populus alba)",
        "Álamo negro (Populus nigra)",
        "Árbol caramelo (Cercidiphyllum japonicum)",
        "Árbol del amor (Cercis siliquastrum)",
        "Árbol del coral (Erythrina crista-galli)",
        "Árbol del paraíso (Melia azedarach)",
      ];

      // Función para cargar la lista de plantas (SIMPLIFICADA)
      function loadPlantsList() {
        plantsList = [...staticPlantsList];
        return plantsList;
      }

      // Función para convertir nombre a filename
      function nameToFilename(name) {
        return name + ".png";
      }

      // Función para cargar una pregunta (CORREGIDA)
      async function loadQuestion() {
        gameActive = false;
        document.getElementById("loading").style.display = "block";
        document.getElementById("plant-image").style.display = "none";
        document.getElementById("question").style.display = "none";
        document.getElementById("options").style.display = "none";
        document.getElementById("next-button").style.display = "none";
        document.getElementById("error").style.display = "none";

        try {
          // Cargar lista de plantas si está vacía
          if (plantsList.length === 0) {
            loadPlantsList();
          }

          // Seleccionar planta aleatoria
          currentPlant =
            plantsList[Math.floor(Math.random() * plantsList.length)];

          // Crear nombre de archivo
          const filename = nameToFilename(currentPlant);

          // Cargar imagen
          const imageElement = document.getElementById("plant-image");
          const imagePath = `./images/${filename}`;

          // Cargar imagen directamente (sin verificar con HEAD)
          imageElement.src = imagePath;

          // Manejar error de carga de imagen
          imageElement.onerror = function () {
            this.src = `https://via.placeholder.com/300x300/4CAF50/FFFFFF?text=${encodeURIComponent(
              currentPlant
            )}`;
          };

          imageElement.style.display = "block";

          // Crear opciones: la correcta + 3 incorrectas
          const options = [currentPlant];
          const availableOptions = plantsList.filter(
            (plant) => plant !== currentPlant
          );

          // Seleccionar 3 opciones incorrectas aleatoriamente
          while (options.length < 4 && availableOptions.length > 0) {
            const randomIndex = Math.floor(
              Math.random() * availableOptions.length
            );
            options.push(availableOptions[randomIndex]);
            availableOptions.splice(randomIndex, 1);
          }

          // Mezclar opciones
          const shuffledOptions = options.sort(() => Math.random() - 0.5);
          correctAnswer = shuffledOptions.indexOf(currentPlant);

          // Mostrar opciones
          const optionButtons = document.querySelectorAll(".option");
          optionButtons.forEach((button, index) => {
            if (index < shuffledOptions.length) {
              button.textContent = shuffledOptions[index];
              button.className = "option";
              button.disabled = false;
              button.style.display = "block";
            } else {
              button.style.display = "none";
            }
          });

          document.getElementById("loading").style.display = "none";
          document.getElementById("question").style.display = "block";
          document.getElementById("options").style.display = "grid";
          gameActive = true;
        } catch (error) {
          console.error("Error cargando pregunta:", error);
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById(
            "error"
          ).textContent = `Error: ${error.message}`;

          setTimeout(() => {
            loadQuestion();
          }, 3000);
        }
      }

      function selectOption(selectedIndex) {
        if (!gameActive) return;

        gameActive = false;
        const optionButtons = document.querySelectorAll(".option");

        optionButtons.forEach((button, index) => {
          button.disabled = true;
          if (index === correctAnswer) {
            button.classList.add("correct");
          } else if (index === selectedIndex) {
            button.classList.add("incorrect");
          }
        });

        if (selectedIndex === correctAnswer) {
          score++;
          document.getElementById("score").textContent = score;
        }

        document.getElementById("next-button").style.display = "block";
      }

      function nextQuestion() {
        loadQuestion();
      }

      function resetGame() {
        score = 0;
        document.getElementById("score").textContent = score;
        loadQuestion();
      }

      // Inicializar juego
      loadQuestion();
    </script>
  </body>
</html>
