<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz de Plantas</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      h1 {
        color: #2d3748;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }

      .score {
        background: linear-gradient(45deg, #48bb78, #38a169);
        color: white;
        padding: 10px 20px;
        border-radius: 25px;
        margin-bottom: 20px;
        font-weight: bold;
        font-size: 1.2em;
      }

      .plant-image {
        width: 300px;
        height: 300px;
        object-fit: cover;
        border-radius: 15px;
        margin: 20px auto;
        display: block;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
      }

      .plant-image:hover {
        transform: scale(1.05);
      }

      .question {
        font-size: 1.5em;
        color: #2d3748;
        margin: 20px 0;
        font-weight: bold;
      }

      .options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
        margin: 30px 0;
      }

      .option {
        background: linear-gradient(45deg, #4299e1, #3182ce);
        color: white;
        border: none;
        padding: 15px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.1em;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .option:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .option:active {
        transform: translateY(0);
      }

      .option.correct {
        background: linear-gradient(45deg, #48bb78, #38a169);
        animation: pulse 0.5s ease-in-out;
      }

      .option.incorrect {
        background: linear-gradient(45deg, #f56565, #e53e3e);
        animation: shake 0.5s ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }

      .next-button {
        background: linear-gradient(45deg, #805ad5, #6b46c1);
        color: white;
        border: none;
        padding: 15px 30px;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1.2em;
        margin-top: 20px;
        transition: all 0.3s ease;
        display: none;
      }

      .next-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .loading {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 4px solid #f3f3f3;
        border-top: 4px solid #3498db;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        color: #e53e3e;
        background: #fed7d7;
        padding: 15px;
        border-radius: 10px;
        margin: 20px 0;
      }

      .reset-button {
        background: linear-gradient(45deg, #ed8936, #dd6b20);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 1em;
        margin-left: 10px;
        transition: all 0.3s ease;
      }

      .reset-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌱 Quiz de Plantas</h1>

      <div class="score">
        Puntuación: <span id="score">0</span>
        <button class="reset-button" onclick="resetGame()">Reiniciar</button>
      </div>

      <div id="loading" class="loading" style="display: none"></div>
      <div id="error" class="error" style="display: none"></div>

      <img
        id="plant-image"
        class="plant-image"
        style="display: none"
        alt="Planta misteriosa"
      />

      <div class="question" id="question" style="display: none">
        ¿Qué planta es esta?
      </div>

      <div class="options" id="options" style="display: none">
        <button class="option" onclick="selectOption(0)"></button>
        <button class="option" onclick="selectOption(1)"></button>
        <button class="option" onclick="selectOption(2)"></button>
        <button class="option" onclick="selectOption(3)"></button>
      </div>

      <button class="next-button" id="next-button" onclick="nextQuestion()">
        Siguiente Pregunta
      </button>
    </div>

    <script>
      let currentPlant = "";
      let correctAnswer = 0;
      let score = 0;
      let gameActive = false;
      let plantsList = []; // Lista que se llenará dinámicamente

      // Función para obtener lista de plantas desde la carpeta images
      async function loadPlantsList() {
        try {
          const response = await fetch("./images/");
          const html = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");
          const links = doc.querySelectorAll("a[href]");

          const imageExtensions = [".jpg", ".jpeg", ".png", ".gif", ".webp"];
          const plants = [];

          links.forEach((link) => {
            const href = link.getAttribute("href");
            if (
              href &&
              imageExtensions.some((ext) => href.toLowerCase().endsWith(ext))
            ) {
              // Extraer nombre del archivo sin extensión
              const filename = href.split("/").pop();
              const plantName = filename
                .replace(/\.[^/.]+$/, "") // Quitar extensión
                .replace(/_/g, " ") // Reemplazar _ por espacios
                .replace(/\b\w/g, (l) => l.toUpperCase()); // Capitalizar primera letra de cada palabra
              plants.push(plantName);
            }
          });

          plantsList = [...new Set(plants)]; // Eliminar duplicados

          if (plantsList.length === 0) {
            throw new Error(
              "No se encontraron imágenes en la carpeta ./images/"
            );
          }

          return plantsList;
        } catch (error) {
          console.error("Error cargando lista de plantas:", error);
          throw error;
        }
      }

      // Función para convertir nombre a filename
      function nameToFilename(name) {
        return name.replace(/\s+/g, "_").toLowerCase();
      }

      // Función para cargar una pregunta
      async function loadQuestion() {
        gameActive = false;
        document.getElementById("loading").style.display = "block";
        document.getElementById("plant-image").style.display = "none";
        document.getElementById("question").style.display = "none";
        document.getElementById("options").style.display = "none";
        document.getElementById("next-button").style.display = "none";
        document.getElementById("error").style.display = "none";

        try {
          // Cargar lista de plantas si está vacía
          if (plantsList.length === 0) {
            await loadPlantsList();
          }

          // Seleccionar planta aleatoria
          currentPlant =
            plantsList[Math.floor(Math.random() * plantsList.length)];

          // Crear nombre de archivo
          const filename = nameToFilename(currentPlant);

          // Intentar cargar imagen con diferentes extensiones
          const imageElement = document.getElementById("plant-image");
          const extensions = ["jpg", "jpeg", "png", "gif", "webp"];
          let imageLoaded = false;

          for (const ext of extensions) {
            try {
              const imagePath = `./images/${filename}.${ext}`;
              const response = await fetch(imagePath, { method: "HEAD" });

              if (response.ok) {
                imageElement.src = imagePath;
                imageLoaded = true;
                break;
              }
            } catch (e) {
              // Continuar con la siguiente extensión
            }
          }

          // Si no se carga la imagen, usar placeholder
          if (!imageLoaded) {
            imageElement.src = `https://via.placeholder.com/300x300/4CAF50/FFFFFF?text=${encodeURIComponent(
              currentPlant
            )}`;
          }

          imageElement.style.display = "block";

          // Crear opciones: la correcta + 3 incorrectas
          const options = [currentPlant];
          const availableOptions = plantsList.filter(
            (plant) => plant !== currentPlant
          );

          // Seleccionar 3 opciones incorrectas aleatoriamente
          while (options.length < 4 && availableOptions.length > 0) {
            const randomIndex = Math.floor(
              Math.random() * availableOptions.length
            );
            options.push(availableOptions[randomIndex]);
            availableOptions.splice(randomIndex, 1);
          }

          // Mezclar opciones
          const shuffledOptions = options.sort(() => Math.random() - 0.5);
          correctAnswer = shuffledOptions.indexOf(currentPlant);

          // Mostrar opciones
          const optionButtons = document.querySelectorAll(".option");
          optionButtons.forEach((button, index) => {
            if (index < shuffledOptions.length) {
              button.textContent = shuffledOptions[index];
              button.className = "option";
              button.disabled = false;
              button.style.display = "block";
            } else {
              button.style.display = "none";
            }
          });

          document.getElementById("loading").style.display = "none";
          document.getElementById("question").style.display = "block";
          document.getElementById("options").style.display = "grid";
          gameActive = true;
        } catch (error) {
          console.error("Error cargando pregunta:", error);
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          document.getElementById(
            "error"
          ).textContent = `Error: ${error.message}. Asegúrate de que la carpeta images sea accesible desde el navegador.`;

          setTimeout(() => {
            loadQuestion();
          }, 3000);
        }
      }

      function selectOption(selectedIndex) {
        if (!gameActive) return;

        gameActive = false;
        const optionButtons = document.querySelectorAll(".option");

        optionButtons.forEach((button, index) => {
          button.disabled = true;
          if (index === correctAnswer) {
            button.classList.add("correct");
          } else if (index === selectedIndex) {
            button.classList.add("incorrect");
          }
        });

        if (selectedIndex === correctAnswer) {
          score++;
          document.getElementById("score").textContent = score;
        }

        document.getElementById("next-button").style.display = "block";
      }

      function nextQuestion() {
        loadQuestion();
      }

      function resetGame() {
        score = 0;
        document.getElementById("score").textContent = score;
        loadQuestion();
      }

      // Inicializar juego
      loadQuestion();
    </script>
  </body>
</html>
