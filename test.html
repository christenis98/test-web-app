<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Test</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="test.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Examen Tipo Test</h1>
      <form id="testForm" class="test-form"></form>
      <div class="upload-section">
        <label for="answersUpload">Upload Answers Excel:</label>
        <input type="file" id="answersUpload" accept=".xlsx" required />
      </div>
      <button id="checkAnswers" class="btn">Comprobar Respuestas</button>
      <pre id="result" class="result-display"></pre>
    </div>
    <script>
      document
        .getElementById("checkAnswers")
        .addEventListener("click", async () => {
          const answersFile = document.getElementById("answersUpload").files[0];

          if (!answersFile) {
            alert("Por favor, sube el archivo de respuestas.");
            return;
          }

          // Aquí puedes agregar la lógica para procesar el archivo de respuestas
        });
    </script>
  </body>
</html>
